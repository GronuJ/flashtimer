<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="Summoner's Rift practice map">
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1b2e"/>
      <stop offset="100%" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#124a6a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0ac8b9" stop-opacity="0.25"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8aa6e" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <symbol id="bolt" viewBox="0 0 24 32">
      <path d="M15 0 L3 18 L11 18 L7 32 L22 12 L14 12 Z"
            fill="#0ac8b9" stroke="#0a1428" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="800" height="300" fill="url(#mapBg)"/>
  <rect width="800" height="300" fill="url(#grid)"/>

  <!-- diagonal river band -->
  <polygon points="0,210 0,260 560,20 610,20" fill="url(#river)"/>

  <!-- three lanes (top, mid, bot) -->
  <rect x="40" y="30" width="720" height="22" rx="11" fill="#c8aa6e" fill-opacity="0.12" stroke="#c8aa6e" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="40,130 760,130 720,152 80,152" fill="#c8aa6e" fill-opacity="0.12" stroke="#c8aa6e" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="40" y="248" width="720" height="22" rx="11" fill="#c8aa6e" fill-opacity="0.12" stroke="#c8aa6e" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- base markers -->
  <circle cx="30" cy="270" r="12" fill="#0ac8b9" fill-opacity="0.25" stroke="#0ac8b9" stroke-width="1.5"/>
  <circle cx="770" cy="30"  r="12" fill="#ff4f6d" fill-opacity="0.25" stroke="#ff4f6d" stroke-width="1.5"/>

  <!-- role markers: Top, Jgl, Mid, Adc, Sup -->
  <g font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="13" letter-spacing="2" fill="#c8aa6e" text-anchor="middle">
    <!-- TOP -->
    <use href="#bolt" x="155" y="10" width="18" height="24"/>
    <text x="164" y="72">TOP</text>

    <!-- JGL (jungle, between lanes) -->
    <use href="#bolt" x="295" y="88" width="18" height="24"/>
    <text x="304" y="132">JGL</text>

    <!-- MID -->
    <use href="#bolt" x="395" y="120" width="18" height="24"/>
    <text x="404" y="175">MID</text>

    <!-- ADC (bot lane) -->
    <use href="#bolt" x="560" y="228" width="18" height="24"/>
    <text x="569" y="288">ADC</text>

    <!-- SUP (bot lane, nearer base) -->
    <use href="#bolt" x="660" y="228" width="18" height="24"/>
    <text x="669" y="288">SUP</text>
  </g>

  <!-- subtle gold frame -->
  <rect x="1" y="1" width="798" height="298" fill="none" stroke="#c8aa6e" stroke-opacity="0.25" stroke-width="1"/>
</svg>
