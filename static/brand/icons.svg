<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- All icons: 24x24 viewBox, 2px stroke, gold, transparent bg, rounded caps/joins -->

    <symbol id="icon-stopwatch" viewBox="0 0 24 24" fill="none" stroke="#c8aa6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="14" r="7"/>
      <line x1="12" y1="14" x2="15.5" y2="11"/>
      <line x1="9.5" y1="3" x2="14.5" y2="3"/>
      <line x1="12" y1="3" x2="12" y2="6"/>
      <line x1="18.5" y1="6.5" x2="20" y2="5"/>
    </symbol>

    <symbol id="icon-bolt" viewBox="0 0 24 24" fill="none" stroke="#c8aa6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2 L4 14 L11 14 L8 22 L20 10 L13 10 Z"/>
    </symbol>

    <symbol id="icon-chart" viewBox="0 0 24 24" fill="none" stroke="#c8aa6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="21" x2="20" y2="21"/>
      <rect x="5"  y="12" width="3" height="7"/>
      <rect x="10.5" y="8" width="3" height="11"/>
      <rect x="16" y="4" width="3" height="15"/>
    </symbol>

    <symbol id="icon-info" viewBox="0 0 24 24" fill="none" stroke="#c8aa6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="11" x2="12" y2="17"/>
      <circle cx="12" cy="7.5" r="0.5" fill="#c8aa6e" stroke="none"/>
    </symbol>

    <symbol id="icon-reset" viewBox="0 0 24 24" fill="none" stroke="#c8aa6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 12 a8 8 0 1 1 -2.3 -5.6"/>
      <polyline points="20,4 20,8 16,8"/>
    </symbol>
  </defs>
</svg>
