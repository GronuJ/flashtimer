<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FlashTimer">
  <rect width="64" height="64" rx="12" fill="#0a1428"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#c8aa6e" stroke-opacity="0.35" stroke-width="1"/>

  <!-- stopwatch crown -->
  <rect x="28.5" y="8" width="7" height="5" rx="1.2" fill="#c8aa6e"/>
  <rect x="25" y="12" width="14" height="4" rx="1.2" fill="#c8aa6e"/>

  <!-- stopwatch body -->
  <circle cx="32" cy="38" r="19" fill="#0f1b2e" stroke="#c8aa6e" stroke-width="2.5"/>

  <!-- tick marks -->
  <g stroke="#c8aa6e" stroke-width="1.8" stroke-linecap="round">
    <line x1="32" y1="22" x2="32" y2="25.5"/>
    <line x1="32" y1="50.5" x2="32" y2="54"/>
    <line x1="16" y1="38" x2="19.5" y2="38"/>
    <line x1="44.5" y1="38" x2="48" y2="38"/>
  </g>

  <!-- lightning bolt -->
  <path d="M36 22 L20 42 L29 42 L25 54 L44 33 L35 33 Z"
        fill="#0ac8b9"
        stroke="#0a1428" stroke-width="1.8" stroke-linejoin="round"/>
</svg>
